name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: zombiegame-linux
            binary: zombiegame
            server_binary: zombie-server
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: zombiegame-windows
            binary: zombiegame.exe
            server_binary: zombie-server.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: zombiegame-macos-arm
            binary: zombiegame
            server_binary: zombie-server
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: zombiegame-macos-intel
            binary: zombiegame
            server_binary: zombie-server

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/${{ matrix.server_binary }} ${{ matrix.artifact }}/
          cp -r assets ${{ matrix.artifact }}/
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p ${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/${{ matrix.server_binary }} ${{ matrix.artifact }}/
          cp -r assets ${{ matrix.artifact }}/
          7z a ${{ matrix.artifact }}.zip ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
